model_dir: models/qwen3-vl-4b-int4-ov
source_model_dir: models/qwen3-vl-4b-source
device: GPU
cache_dir: models/qwen3-vl-cache
instruction: 持续沿可通行区域流畅行驶，接近障碍时选择更开阔的一侧绕行，无法通过时停车
interval_s: 1.0
image_max_side: 448
max_new_tokens: 180
frames_per_inference: 4
chat_reset_turns: 12

safety:
  stop_distance_m: 0.16
  turn_clearance_m: 0.16
  minimum_confidence: 0.65
  max_result_age_s: 15.0
  max_command_duration_s: 12.0
  require_lidar: true
  max_linear_mps: 0.10
  max_angular_radps: 0.35
  slow_linear_mps: 0.05
  turn_linear_mps: 0.03
